<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Adult Income Prediction</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;

    background:linear-gradient(-45deg,#4f46e5,#06b6d4,#3b82f6,#7c3aed);
    background-size:400% 400%;
    animation:gradientBG 15s ease infinite;
}

@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{

    width:95%;
    max-width:1450px;

    padding:40px;

    border-radius:25px;

    background:rgba(255,255,255,0.12);

    backdrop-filter:blur(18px);

    -webkit-backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.25);

    box-shadow:0 20px 50px rgba(0,0,0,.35);

}

h1{

    text-align:center;

    color:white;

    font-size:38px;

    font-weight:700;

    margin-bottom:10px;

}

.subtitle{

    text-align:center;

    color:#e8e8e8;

    margin-bottom:35px;

    font-size:18px;

}

.form-grid{

    display:grid;

    grid-template-columns:repeat(5,1fr);

    gap:22px;

}

.form-group{

    display:flex;

    flex-direction:column;

}

label{

    color:white;

    margin-bottom:8px;

    font-weight:600;

    font-size:15px;

}

input,
select{

    padding:14px;

    border-radius:14px;

    border:1px solid rgba(255,255,255,.25);

    background:rgba(255,255,255,.15);

    color:white;

    font-size:15px;

    transition:.35s;

}

input::placeholder{
    color:#ddd;
}

select option{
    color:black;
}

input:focus,
select:focus{

    outline:none;

    border-color:#00e5ff;

    background:rgba(255,255,255,.25);

    box-shadow:0 0 0 4px rgba(0,229,255,.2);

    transform:translateY(-2px);

}

.btn{

    width:260px;

    margin:40px auto;

    display:block;

    padding:16px;

    border:none;

    border-radius:50px;

    cursor:pointer;

    font-size:18px;

    font-weight:600;

    color:white;

    background:linear-gradient(135deg,#00c6ff,#0072ff);

    transition:.35s;

    letter-spacing:.5px;

}

.btn:hover{

    transform:translateY(-4px) scale(1.03);

    box-shadow:0 15px 30px rgba(0,114,255,.45);

}

.btn:active{

    transform:scale(.98);

}

.result{

    display:none;

    margin-top:35px;

    padding:30px;

    border-radius:18px;

    background:rgba(255,255,255,.15);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,.25);

    text-align:center;

}

.result h2{

    color:#ffffff;

    font-size:28px;

}

.result p{

    margin-top:15px;

    color:#ffffff;

    font-size:24px;

    font-weight:600;

}

.loader{

    display:none;

    text-align:center;

    color:white;

    margin-top:20px;

    font-size:18px;

}

/* Scrollbar */

::-webkit-scrollbar{
    width:10px;
}

::-webkit-scrollbar-track{
    background:#1e1e2f;
}

::-webkit-scrollbar-thumb{
    background:#4facfe;
    border-radius:20px;
}

/* Responsive */

@media(max-width:1200px){

.form-grid{
grid-template-columns:repeat(3,1fr);
}

}

@media(max-width:768px){

.container{
padding:25px;
}

h1{
font-size:30px;
}

.form-grid{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:500px){

.form-grid{
grid-template-columns:1fr;
}

.btn{
width:100%;
}

}

</style>

</head>

<body>

<div class="container">

<h1>Adult Income Prediction</h1>

<p class="subtitle">
Predict whether annual income is greater than $50K using Machine Learning
</p>

<form id="predictionForm">

<div class="form-grid">

<div class="form-group">
<label>Age</label>
<input type="number" id="age" required>
</div>

<div class="form-group">
<label>Workclass</label>
<select id="workclass">

<option>Private</option>
<option>Self-emp-not-inc</option>
<option>Local-gov</option>
<option>?</option>
<option>State-gov</option>
<option>Self-emp-inc</option>
<option>Federal-gov</option>
<option>Without-pay</option>
<option>Never-worked</option>

</select>
</div>

<div class="form-group">
<label>Fnlwgt</label>
<input type="number" id="fnlwgt" required>
</div>

<div class="form-group">
<label>Education Number</label>
<input type="number" id="education_num" required>
</div>

<div class="form-group">
<label>Occupation</label>

<select id="occupation">

<option>Prof-specialty</option>
<option>Craft-repair</option>
<option>Exec-managerial</option>
<option>Adm-clerical</option>
<option>Sales</option>
<option>Other-service</option>
<option>Machine-op-inspct</option>
<option>?</option>
<option>Transport-moving</option>
<option>Handlers-cleaners</option>
<option>Farming-fishing</option>
<option>Tech-support</option>
<option>Protective-serv</option>
<option>Priv-house-serv</option>
<option>Armed-Forces</option>

</select>

</div>

<div class="form-group">
<label>Race</label>

<select id="race">

<option>White</option>
<option>Black</option>
<option>Asian-Pac-Islander</option>
<option>Amer-Indian-Eskimo</option>
<option>Other</option>

</select>

</div>

<div class="form-group">
<label>Sex</label>

<select id="sex">

<option>Male</option>
<option>Female</option>

</select>

</div>

<div class="form-group">
<label>Capital Gain</label>
<input type="number" id="capital_gain" required>
</div>

<div class="form-group">
<label>Capital Loss</label>
<input type="number" id="capital_loss" required>
</div>

<div class="form-group">
<label>Hours / Week</label>
<input type="number" id="hours_per_week" required>
</div>

</div>

<button class="btn" type="submit">

Predict Income

</button>

</form>

<div class="loader" id="loader">

Predicting...

</div>

<div class="result" id="result">

<h2>Prediction Result</h2>

<p id="predictionText"></p>

<p id="confidenceText"></p>

</div>

</div>

<script>

document.getElementById("predictionForm").addEventListener("submit",async function(e){

e.preventDefault();

document.getElementById("loader").style.display="block";
document.getElementById("result").style.display="none";

const payload={

age:parseInt(document.getElementById("age").value),

workclass:document.getElementById("workclass").value,

fnlwgt:parseFloat(document.getElementById("fnlwgt").value),

education_num:parseInt(document.getElementById("education_num").value),

occupation:document.getElementById("occupation").value,

race:document.getElementById("race").value,

sex:document.getElementById("sex").value,

capital_gain:parseFloat(document.getElementById("capital_gain").value),

capital_loss:parseFloat(document.getElementById("capital_loss").value),

hours_per_week:parseFloat(document.getElementById("hours_per_week").value)

};

try{

const response=await fetch("/predict",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify(payload)

});

const data=await response.json();

document.getElementById("loader").style.display="none";

document.getElementById("result").style.display="block";

document.getElementById("predictionText").innerHTML=
"<b>Prediction :</b> "+data.label;

document.getElementById("confidenceText").innerHTML=
"<b>Confidence :</b> "+(data.confidence*100).toFixed(2)+" %";

}

catch(error){

document.getElementById("loader").style.display="none";

alert("Prediction failed.");

}

});

</script>

</body>
</html>
